services:
  - type: web
    name: ai-extension-trader
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALPACA_CLIENT_ID
        sync: false
      - key: ALPACA_CLIENT_SECRET
        sync: false
      - key: ALPACA_REDIRECT_URI
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: NEWSDATA_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
